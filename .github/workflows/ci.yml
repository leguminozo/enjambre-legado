name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Todas las variables de entorno via GitHub Secrets — nada hardcodeado.
# service_role requerido en secrets para runtime server en Vercel.
env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  NEXT_PUBLIC_NUCLEO_API_URL: ${{ secrets.NEXT_PUBLIC_NUCLEO_API_URL }}
  NEXT_PUBLIC_URL_TIENDA: ${{ secrets.NEXT_PUBLIC_URL_TIENDA }}
  NEXT_PUBLIC_URL_CAMPO: ${{ secrets.NEXT_PUBLIC_URL_CAMPO }}
  NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  test:
    runs-on: ubuntu-latest
    # Tests de middleware asumen origen localhost:3000; builds usan URLs prod del workflow env.
    env:
      NEXT_PUBLIC_URL_TIENDA: http://localhost:3000
      NEXT_PUBLIC_URL_CAMPO: http://localhost:3002
      NEXT_PUBLIC_SITE_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test contable
        run: pnpm --filter @enjambre/contable test

      - name: Test fiscal
        run: pnpm --filter @enjambre/fiscal test

      - name: Test pricing
        run: pnpm --filter @enjambre/pricing test

      - name: Test resenas
        run: pnpm --filter @enjambre/resenas test

      - name: Test wallet
        run: pnpm --filter @enjambre/wallet test

      - name: Test logistica
        run: pnpm --filter @enjambre/logistica test

      - name: Test auth
        run: pnpm --filter @enjambre/auth test

      - name: Test ui
        run: pnpm --filter @enjambre/ui test

      - name: Test sumup
        run: pnpm --filter @enjambre/sumup test

      - name: Test banco-chile
        run: pnpm --filter @enjambre/banco-chile test

      - name: Test sale-qr
        run: pnpm --filter @enjambre/sale-qr test

      - name: Test shop-chrome
        run: pnpm --filter @enjambre/shop-chrome test

      - name: Test database
        run: pnpm --filter @enjambre/database test

      - name: Test nucleo
        run: pnpm --filter @enjambre/nucleo test

      - name: Test tienda
        run: pnpm --filter @enjambre/tienda test

      - name: Test campo
        run: pnpm --filter @enjambre/campo test

      - name: Coverage gates (critical modules)
        run: |
          pnpm --filter @enjambre/campo exec vitest run --coverage
          pnpm --filter @enjambre/tienda exec vitest run --coverage app/api/cms/revalidate/route.test.ts
          pnpm --filter @enjambre/nucleo exec vitest run --coverage -- src/lib/revalidate-tienda.test.ts
          pnpm --filter @enjambre/sale-qr exec vitest run --coverage
          pnpm --filter @enjambre/shop-chrome exec vitest run --coverage
          pnpm --filter @enjambre/pricing exec vitest run --coverage
          pnpm --filter @enjambre/wallet exec vitest run --coverage
          pnpm --filter @enjambre/resenas exec vitest run --coverage
          pnpm --filter @enjambre/logistica exec vitest run --coverage
          pnpm --filter @enjambre/auth exec vitest run --coverage
          pnpm --filter @enjambre/ui exec vitest run --coverage
          pnpm --filter @enjambre/sumup exec vitest run --coverage
          pnpm --filter @enjambre/banco-chile exec vitest run --coverage

  build-tienda:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tienda
        run: pnpm --filter @enjambre/tienda build

      - name: Lint tienda
        run: pnpm --filter @enjambre/tienda lint

  e2e-tienda-smoke:
    runs-on: ubuntu-latest
    needs: build-tienda
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_NUCLEO_API_URL: ${{ secrets.NEXT_PUBLIC_NUCLEO_API_URL }}
      NEXT_PUBLIC_URL_TIENDA: http://localhost:3001
      NEXT_PUBLIC_SITE_URL: http://localhost:3001
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CI: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @enjambre/tienda exec playwright install --with-deps chromium

      - name: Smoke E2E tienda (nav + route guards)
        run: pnpm --filter @enjambre/tienda test:e2e:smoke

  build-nucleo:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build nucleo
        run: pnpm --filter @enjambre/nucleo build

      - name: Lint nucleo
        run: pnpm --filter @enjambre/nucleo lint

  e2e-nucleo-editor:
    runs-on: ubuntu-latest
    needs: build-nucleo
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_URL_TIENDA: http://localhost:3001
      CI: true
      E2E_SKIP_AUTH: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @enjambre/nucleo exec playwright install --with-deps chromium

      - name: Smoke E2E Editor de Tienda
        run: pnpm --filter @enjambre/nucleo exec playwright test e2e/editor-tienda.spec.ts

  build-campo:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build campo
        run: pnpm --filter @enjambre/campo build

      - name: Lint campo
        run: pnpm --filter @enjambre/campo lint

  e2e-campo-smoke:
    runs-on: ubuntu-latest
    needs: build-campo
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_NUCLEO_API_URL: ${{ secrets.NEXT_PUBLIC_NUCLEO_API_URL }}
      NEXT_PUBLIC_URL_TIENDA: http://localhost:3001
      CI: true
      E2E_SKIP_AUTH: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @enjambre/campo exec playwright install --with-deps chromium

      - name: Smoke E2E campo (login / pos redirect)
        run: pnpm --filter @enjambre/campo test:e2e:smoke
