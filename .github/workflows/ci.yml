name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Producción: vars públicas embebidas — no requiere .env.local ni secrets para build.
# service_role solo si está en GitHub Secrets (runtime server en Vercel).
env:
  NEXT_PUBLIC_SUPABASE_URL: https://hdhamxiblwwskvvqbcfo.supabase.co
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: sb_publishable_sqF0fBsTuNzSKgpapPrU3Q_VUf0s-A1
  NEXT_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_sqF0fBsTuNzSKgpapPrU3Q_VUf0s-A1
  NEXT_PUBLIC_NUCLEO_API_URL: https://nucleo-theta.vercel.app
  NEXT_PUBLIC_URL_TIENDA: https://tienda-eta-lime.vercel.app
  NEXT_PUBLIC_URL_CAMPO: https://campo-olive.vercel.app
  NEXT_PUBLIC_SITE_URL: https://tienda-eta-lime.vercel.app
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  test:
    runs-on: ubuntu-latest
    # Tests de middleware asumen origen localhost:3000; builds usan URLs prod del workflow env.
    env:
      NEXT_PUBLIC_URL_TIENDA: http://localhost:3000
      NEXT_PUBLIC_URL_CAMPO: http://localhost:3002
      NEXT_PUBLIC_SITE_URL: http://localhost:3001
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test contable
        run: pnpm --filter @enjambre/contable test

      - name: Test fiscal
        run: pnpm --filter @enjambre/fiscal test

      - name: Test pricing
        run: pnpm --filter @enjambre/pricing test

      - name: Test auth
        run: pnpm --filter @enjambre/auth test

      - name: Test nucleo
        run: pnpm --filter @enjambre/nucleo test

      - name: Test tienda
        run: pnpm --filter @enjambre/tienda test

  build-tienda:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build tienda
        run: pnpm --filter @enjambre/tienda build

      - name: Lint tienda
        run: pnpm --filter @enjambre/tienda lint
        continue-on-error: true

  build-nucleo:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build nucleo
        run: pnpm --filter @enjambre/nucleo build

      - name: Lint nucleo
        run: pnpm --filter @enjambre/nucleo lint
        continue-on-error: true

  build-campo:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build campo
        run: pnpm --filter @enjambre/campo build

      - name: Lint campo
        run: pnpm --filter @enjambre/campo lint
        continue-on-error: true